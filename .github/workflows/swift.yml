name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build app bundle
        env:
          VERSION: 0.2.0
          ARCHS: universal
        run: |
          chmod +x Scripts/*.sh
          Scripts/build-app.sh
          Scripts/verify-app.sh
          Scripts/create-dmg.sh

      - name: Upload installable app
        uses: actions/upload-artifact@v4
        with:
          name: ukagaka-macos-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error
